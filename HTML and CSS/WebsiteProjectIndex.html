<header>

    <a href="" class="header_links" id="homeid">Home</a>

<main>
    <h2>Here are some pictures of dogs:</h2>
    <img src="Images/dog1.webp" class="dog_images">
    <img src="Images/dog2.webp" class="dog_images">
    <img src="Images/dog3.webp" class="dog_images">

    <h1>Form about you</h1>
        <form action="index.php" method="POST" enctype="multipart/form-data">

            <label for="username">username:</label>
            <input type="text" id="username" placeholder="Spongebob" minlength="6" maxlength="15" required>

            <label for="password">password:</label>
            <input type="password" id="password" placeholder="Spongebob" minlength="6" maxlength="15" required><br>

            <label for="email">Email:</label>
            <input type="email" id="email" placeholder="email@gmail.com"><br>

            <label for="number">number:</label>
            <input type="tel" id="number" placeholder="123-456-3243" pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}"><br>

            <label for="bday">bday:</label>
            <input type="date" id="bday"><br>

            <label for="quantity">quantity:</label>
            <input type="number" id="quantity" min="0" max="99" value="1"><br>

            <label for="Mr.">Mr.</label>
            <input type="radio" id="Mr." value="Mr." name="title">
            <label for="Mrs">Mrs.</label>
            <input type="radio" id="Mrs." value="Mrs." name="title">

            <label for="payment.">Payment.</label>
            <select id="payment">
                <option value="visa">visa</option>
                <option value="mastercard">mastercard</option>
                <option value="giftcard">giftcard</option>
            </select> 

            <label for="subscribe">subscribe:</label>
            <input type="checkbox" id="subscribe"><br>

            <label for="comment">comment:</label>
            <textarea id="comment" rows="3" cols="25"></textarea>

            <label for="file">file:</label>
            <input type="file" id="file" accept="image/png, image/jpeg"><br>

            <input type="reset"><br>
            <input type="submit">
            <hr>
            <img src="Images/dog4.webp" class="dog_images" id="last_dog_image">


</main>

<footer>
Thank you for looking at this website
